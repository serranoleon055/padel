spring.application.name=rankpadel

# ── Base de datos ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/rankpadel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
logging.level.org.springframework.security=WARN

# ── Flyway ─────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# ── JWT ────────────────────────────────────────────────────────
# En producción: configurá JWT_SECRET como variable de entorno (BASE64 de al menos 256 bits).
# Por defecto usa la clave de desarrollo (SOLO para dev local).
jwt.secret=${JWT_SECRET:cmFua3BhZGVsLWRldi1rZXktMjAyNi1jaGFuZ2UtaW4tcHJvZHVjdGlvbiEh}
jwt.expiration-ms=86400000

# ── Swagger UI ─────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Jackson ────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:/uploads}

# ── Zona horaria ───────────────────────────────────────────────
app.zona-horaria=${APP_ZONA_HORARIA:America/Argentina/Buenos_Aires}

# ── Mercado Pago / Pagos ───────────────────────────────────────
app.mercadopago.access-token=${MERCADO_PAGO_ACCESS_TOKEN:}
app.mercadopago.back-url-base=${MERCADO_PAGO_BACK_URL_BASE:http://localhost:5173}
app.mercadopago.notification-url=${MERCADO_PAGO_NOTIFICATION_URL:}
app.pagos.porcentaje-senia-default=${PAGOS_SENIA_PORCENTAJE:50}
app.pagos.expiracion-pago-minutos=${PAGOS_EXPIRACION_MINUTOS:30}
app.pagos.modo-demo=${PAGOS_MODO_DEMO:false}

# ── Cloudinary (imagenes persistentes) ─────────────────────────
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
