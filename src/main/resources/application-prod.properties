spring.application.name=rankpadel

# Railway/Render inyectan el puerto vía la variable PORT.
server.port=${PORT:8080}

# ============================================================
#  PERFIL DE PRODUCCIÓN
#  Activar con: SPRING_PROFILES_ACTIVE=prod
#  Todas las credenciales y URLs vienen de variables de entorno.
#  Si falta alguna obligatoria, el arranque FALLA a propósito.
# ============================================================

# ── Base de datos ──────────────────────────────────────────────
# DB_URL: JDBC completo del MySQL gestionado, p. ej.
#   jdbc:mysql://host:3306/rankpadel_db?useSSL=true&requireSSL=true&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Flyway ─────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
# Limpia entradas de migraciones fallidas en flyway_schema_history antes de migrar.
# Necesario para destrabar una DB que quedo con una migracion en estado failed.
spring.flyway.repair-on-migrate=true

# ── JWT (OBLIGATORIO en prod, sin default → falla si no está) ──
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Admin inicial (OBLIGATORIO en prod, lo usa AdminBootstrap) ─
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.initial-password=${ADMIN_INITIAL_PASSWORD}

# ── CORS (OBLIGATORIO: dominio real del frontend) ──────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ── Swagger / OpenAPI: DESHABILITADO en prod ───────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ── Actuator: solo health expuesto ─────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Jackson ────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ── Subida de imágenes ─────────────────────────────────────────
# UPLOAD_DIR debe apuntar a un volumen persistente del hosting
# (Railway Volume / Render Disk), p. ej. /data/uploads
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.upload.dir=${UPLOAD_DIR:/data/uploads}
app.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:/uploads}

# ── Cloudinary (opcional) ──────────────────────────────────────
# Si CLOUDINARY_CLOUD_NAME está definido, las imágenes se suben a Cloudinary
# (recomendado en prod) en vez del disco/volumen local.
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ── Rate limit de login (ajustable por env) ────────────────────
app.security.login-rate-limit.max-attempts=${LOGIN_MAX_ATTEMPTS:10}
app.security.login-rate-limit.window-seconds=${LOGIN_WINDOW_SECONDS:60}
