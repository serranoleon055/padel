name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Suite completa de tests (el @SpringBootTest está @Disabled, no requiere DB)
        run: |
          chmod +x mvnw
          ./mvnw -B clean test

      - name: Compilar y empaquetar
        run: ./mvnw -B -DskipTests package
